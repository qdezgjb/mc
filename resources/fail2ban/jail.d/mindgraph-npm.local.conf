# Nginx Proxy Manager: NPM_HOME is the directory containing docker-compose.yml (e.g. ~/npm).
# Logs: NPM_HOME/data/logs/proxy-host-<N>_access.log — <N> matches the proxy host in NPM UI.
# Example: /root/npm/data/logs/proxy-host-1_access.log
#
# action: apply host firewall ban (default %(action_)s) then report to AbuseIPDB.
# Edit action.d/mindgraph-abuseipdb.conf (MindGraph path). Validate with: sudo fail2ban-client -d | head
# Report-only (no iptables/nftables): comment the two lines below and use instead:
#   action = mindgraph-abuseipdb

[npm-mindgraph]
enabled = true
filter = npm-mindgraph
logpath = /root/npm/data/logs/proxy-host-1_access.log
port = http,https
maxretry = 12
findtime = 10m
bantime = 1h
# DingTalk webhook egress IPs (robot HTTP callbacks): do not ban.
# Full list: https://open.dingtalk.com/document/robots/robot-overview (outbound IP allowlist section)
# 59.82.0.0/16 covers the primary CN egress block seen in practice; add others if needed.
ignoreip = 127.0.0.1/8 ::1 59.82.0.0/16
action = %(action_)s
         mindgraph-abuseipdb
